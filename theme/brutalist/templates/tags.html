{% extends "base.html" %}

{% block title %}tags {{ SITENAME }}{% endblock %}

{% block content %}
<div class="articles">
    <div class="custom-page">
        <h1>tags</h1>
    </div>
</div>
<div class="articles">
    <ul>
    {% for tag, articles in tags %}
        <li><a href="{{ SITEURL }}/{{ tag.url }}">{{ tag }}</a> <span class="count">({{ articles|count }})</span></li>
    {% endfor %}
    </ul>
</div>
{% endblock %}
