{% extends "base.html" %}
{% block title %}{{ tag }}, {% endblock title %}

{% block meta %}
    <meta name="title" content="{{ tag }}, {{ SITENAME }}">
    <meta name="description" content="{{ SITEDESCRIPTION }}">
    <meta name="keywords" content="{{ tag }}">
{% endblock meta %}

{% block ogtags %}
    <meta property="og:url" content="{{ SITEURL }}/tag/{{ tag }}">
    <meta property="og:title" content="{{ tag }}, {{ SITENAME }}">
{% endblock ogtags %}
{% block content %}
    <div class="page-title">
        <h1><img class="tag" src="{{ SITEURL }}/images/tag.png" alt="Tag icon. This icon is part of the Gnote project, licensed under the GPLv3."> {{ tag }}</h1>
    </div>
    {% include 'article_list.html' %}
{% endblock content %}
