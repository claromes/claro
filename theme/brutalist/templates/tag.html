{% extends "base.html" %}
{% block title %}{{ tag }}, {{ SITENAME }}{% endblock title %}

{% block meta %}
    <meta name="title" content="{{ tag }}, {{ SITENAME }}">
    <meta name="description" content="{{ SITEDESCRIPTION }}">
    <meta name="keywords" content="{{ tag }}">
{% endblock meta %}

{% block ogtags %}
    <meta property="og:url" content="{{ SITEURL }}/tag/{{ tag }}">
    <meta property="og:title" content="{{ tag }}, {{ SITENAME }}">
{% endblock ogtags %}
{% block content %}
    <div class="page-title">
        <h1><img class="tag" src="{{ SITEURL }}/images/website/emoji-label.svg" width="20" height="20" alt="Label Emoji version 1.0"> {{ tag }}</h1>
    </div>
    {% include 'article_list.html' %}
{% endblock content %}
